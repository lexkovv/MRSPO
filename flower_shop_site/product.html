<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
  <title>PLANT•SHOP — Товар</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div class="container">
    <header class="header">
      <a class="logo" href="index.html">PLANT•SHOP</a>
      <nav class="nav">
        <a href="catalog.html">Каталог</a>
        <a href="index.html#delivery">Доставка</a>
        <a href="index.html#contacts">Контакты</a>
      </nav>
      <div class="icons">
        <a class="icon-btn" href="#" aria-label="Корзина">🛒</a>
      </div>
    </header>

    <main class="section">
      <section class="card product-page">
        <img class="product-page__img" src="img/offer1.jpg" alt="Daisies" />
        <div>
          <h1 class="h1" style="margin-top:0;">Полевые ромашки</h1>
          <p class="muted">Нежные и светлые. Отлично для подарка и уюта дома.</p>

          <div class="price" style="font-size:26px; margin:10px 0 14px;">250 ₽</div>

          <div style="display:flex; gap:12px; flex-wrap:wrap;">
            <button class="btn btn--primary" type="button">В корзину</button>
            <a class="btn btn--secondary" href="catalog.html">Назад</a>
          </div>

          <div class="section">
            <div><b>Состав:</b> ромашки, зелень</div>
            <div style="margin-top:6px;"><b>Доставка:</b> сегодня/завтра</div>
            <div style="margin-top:6px;"><b>Уход:</b> менять воду раз в 2 дня</div>
          </div>
        </div>
      </section>
    </main>

    <footer class="footer">
      <div>
        <div class="logo">PLANT•SHOP</div>
        <div class="muted">Уют начинается с зелени.</div>
      </div>
      <div class="footer__col">
        <div class="footer__title">Навигация</div>
        <a href="index.html">Главная</a>
        <a href="catalog.html">Каталог</a>
      </div>
      <div class="footer__col">
        <div class="footer__title">Контакты</div>
        <a href="index.html#contacts">Написать</a>
        <a href="index.html#delivery">Доставка</a>
      </div>
    </footer>
  </div>
</body>
</html>
